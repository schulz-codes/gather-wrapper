name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PREV=$(git show HEAD~1:package.json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" != "$PREV" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build native binary (universal)
        run: |
          swiftc -O --target arm64-apple-macosx13.0 -o native/camera-check-arm64 native/camera-check.swift
          swiftc -O --target x86_64-apple-macosx13.0 -o native/camera-check-x64 native/camera-check.swift
          lipo -create native/camera-check-arm64 native/camera-check-x64 -output native/camera-check
          rm native/camera-check-arm64 native/camera-check-x64

      - name: Build TypeScript
        run: pnpm build

      - name: Package app
        run: pnpm exec electron-builder --mac --universal
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: [check-version, build-and-release]
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew Cask
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: schulz-codes/homebrew-tap
          event-type: update-cask
          client-payload: |
            {
              "version": "${{ needs.check-version.outputs.version }}",
              "zip_url": "https://github.com/schulz-codes/gather-wrapper/releases/download/v${{ needs.check-version.outputs.version }}/Gather-${{ needs.check-version.outputs.version }}-universal-mac.zip"
            }
