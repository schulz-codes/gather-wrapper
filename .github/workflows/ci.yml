name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: "Version Packages"
          commit: "chore: version packages"
          publish: echo "noop"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: version
    if: needs.version.outputs.published == 'true'
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build native binary (universal)
        run: |
          swiftc -O --target arm64-apple-macosx13.0 -o native/camera-check-arm64 native/camera-check.swift
          swiftc -O --target x86_64-apple-macosx13.0 -o native/camera-check-x64 native/camera-check.swift
          lipo -create native/camera-check-arm64 native/camera-check-x64 -output native/camera-check
          rm native/camera-check-arm64 native/camera-check-x64

      - name: Build TypeScript
        run: pnpm build

      - name: Package app
        run: pnpm exec electron-builder --mac --universal
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: [version, build-and-release]
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew Cask
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: schulz-codes/homebrew-tap
          event-type: update-cask
          client-payload: |
            {
              "version": "${{ needs.version.outputs.version }}",
              "zip_url": "https://github.com/schulz-codes/gather-wrapper/releases/download/v${{ needs.version.outputs.version }}/Gather-${{ needs.version.outputs.version }}-universal-mac.zip"
            }
